<!DOCTYPE html>
<html>
  <head>
    <title>CRUD VR - Pedro Nascimento</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script type="module" src="app.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sky color="#87CEEB"></a-sky>
      <a-plane rotation="-90 0 0" width="50" height="50" color="#999" shadow="receive: true"></a-plane>
      <a-entity light="type: ambient; intensity: 0.6"></a-entity>
      <a-entity light="type: directional; castShadow: true; intensity: 0.6" position="-1 3 1"></a-entity>

      <a-entity id="ui-panel" position="-2.5 1.5 -3" rotation="0 15 0">
        <a-text value="GESTAO DE ESTOQUE VR" align="center" position="0 1.2 0" color="#FFF" scale="0.6"></a-text>
        
        <a-box id="btn-create" color="#2E7D32" depth="0.1" height="0.3" width="1.6" class="clickable" position="0 0.8 0">
            <a-text value="ENTRADA DE MATERIAL" align="center" position="0 0 0.06" scale="0.4"></a-text>
        </a-box>
        
        <a-box id="btn-color-mode" color="#8B4513" depth="0.1" height="0.3" width="1.6" class="clickable" position="0 0.4 0">
            <a-text id="txt-color" value="MUDAR COR: OFF" align="center" position="0 0 0.06" scale="0.4"></a-text>
        </a-box>

        <a-box id="btn-shape-mode" color="#1565C0" depth="0.1" height="0.3" width="1.6" class="clickable" position="0 0.0 0">
            <a-text id="txt-shape" value="MUDAR FORMA: OFF" align="center" position="0 0 0.06" scale="0.4"></a-text>
        </a-box>
        
        <a-box id="btn-delete-mode" color="#8B0000" depth="0.1" height="0.3" width="1.6" class="clickable" position="0 -0.4 0">
            <a-text id="txt-delete" value="SAIDA DE ESTOQUE" align="center" position="0 0 0.06" scale="0.4"></a-text>
        </a-box>
    </a-entity>

      <a-entity id="inventory-container"></a-entity>

      <a-entity camera look-controls position="0 1.6 0">
        <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
